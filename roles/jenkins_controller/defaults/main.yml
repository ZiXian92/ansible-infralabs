---
jenkins_controller_http_port: 8080
jenkins_controller_home: /var/lib/jenkins
jenkins_controller_manage_packages: true

# Lab-grade local admin account created via JCasC (skips the setup wizard). Fine for
# an isolated lab/test controller; a real deployment should source these from Vault
# or an external identity provider instead.
jenkins_controller_admin_user: admin
jenkins_controller_admin_password: admin

# Plugins required for the Docker Cloud use case.
jenkins_controller_plugins:
  - docker-plugin
  - docker-java-api
  - configuration-as-code

# Jenkins Configuration-as-Code (JCasC) is the intended mechanism for declaring
# the controller config, including the Docker Cloud (see jenkins_docker_cloud).
jenkins_controller_casc_dir: "{{ jenkins_controller_home }}/casc_configs"
