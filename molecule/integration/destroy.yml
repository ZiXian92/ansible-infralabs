---
# Custom destroy playbook: tears down everything prepare.yml created (Vault sidecar,
# scenario network) in addition to the Molecule-managed platform containers
# themselves -- Molecule doesn't know about the sidecar or network, so its own
# teardown alone would leak them. Called both by Molecule's own `destroy` step
# (`--destroy=always` in tasks.ps1's `test-integration` action) and, as a
# fail-safe, by that action's PowerShell `finally` block if Molecule itself
# crashes first.
- name: Destroy hermetic fixtures and platforms
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vault_sidecar_name: molecule-integration-vault
    scratch_approle_file: "{{ playbook_dir }}/.ephemeral-approle.json"

  tasks:
    - name: Remove the Molecule platform containers
      ansible.builtin.command:
        cmd: "podman rm -f {{ item }}"
      loop:
        - docker-host
        - jenkins-controller
      register: _rm
      failed_when: false
      changed_when: _rm.rc == 0

    - name: Remove the ephemeral scratch files
      ansible.builtin.file:
        path: "{{ scratch_approle_file }}"
        state: absent

    # Everything prepare.yml provisioned Vault-side (KV mount, CA/cert secrets,
    # policy, AppRole) dies with the ephemeral dev-mode Vault sidecar below -- dev
    # mode keeps no persistent storage, so there's nothing else to unwind
    # explicitly (unlike the old Terraform-workspace approach, which needed an
    # explicit destroy plus workspace select/delete).
    - name: Stop and remove the ephemeral Vault sidecar
      ansible.builtin.command:
        cmd: "podman rm -f {{ vault_sidecar_name }}"
      register: _vault_rm
      failed_when: false
      changed_when: _vault_rm.rc == 0

    # The scenario network itself is NOT removed here: this playbook runs *inside*
    # the executor, which is itself still attached to that network for as long as
    # its own `podman run` (tasks.ps1's Invoke-Executor) is in flight -- `podman
    # network rm` can never succeed while that's true. tasks.ps1 removes it after
    # Invoke-Executor returns and the executor container is gone.
