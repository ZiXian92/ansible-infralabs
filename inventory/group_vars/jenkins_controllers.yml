---
# The Jenkins controller needs the CA and the client cert/key to authenticate to
# the Docker host's mTLS API.
vault_certs_install_ca: true
vault_certs_install_server: false
vault_certs_install_client: true

# Docker Cloud endpoint + agent image: deployment config, not a sensible role
# default (see roles/jenkins_docker_cloud/defaults/main.yml). The URI is derived
# from the docker_hosts group + docker_host_tls_port (group_vars/all.yml)
# instead of a second hardcoded "docker-host:2376" literal.
jenkins_cloud_docker_host_uri: "tcp://{{ groups['docker_hosts'][0] }}:{{ docker_host_tls_port }}"
jenkins_cloud_agent_image: jenkins/inbound-agent:latest
