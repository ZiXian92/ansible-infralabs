---
# Static inventory for a real run. Molecule generates its own inventory for the
# ephemeral test containers, so this is only used for `ansible-playbook` against
# real hosts.
all:
  children:
    jenkins_controllers:
      hosts:
        jenkins-controller:
          ansible_host: jenkins-controller
    docker_hosts:
      hosts:
        docker-host:
          ansible_host: docker-host
